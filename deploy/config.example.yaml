# =============================================================================
# Server Configuration
# 鏈嶅姟鍣ㄩ厤缃?# =============================================================================
server:
  # Bind address (0.0.0.0 for all interfaces)
  # 缁戝畾鍦板潃锛?.0.0.0 琛ㄧず鐩戝惉鎵€鏈夌綉缁滄帴鍙ｏ級
  host: "0.0.0.0"
  # Port to listen on
  # 鐩戝惉绔彛
  port: 8080
  # Mode: "debug" for development, "release" for production
  # 杩愯妯″紡锛?debug" 鐢ㄤ簬寮€鍙戯紝"release" 鐢ㄤ簬鐢熶骇鐜
  mode: "release"
  # Frontend base URL used to generate external links in emails (e.g. password reset)
  # 鐢ㄤ簬鐢熸垚閭欢涓殑澶栭儴閾炬帴锛堜緥濡傦細閲嶇疆瀵嗙爜閾炬帴锛夌殑鍓嶇鍩虹鍦板潃
  # Example: "https://example.com"
  frontend_url: ""
  # Trusted proxies for X-Forwarded-For parsing (CIDR/IP). Empty disables trusted proxies.
  # 淇′换鐨勪唬鐞嗗湴鍧€锛圕IDR/IP 鏍煎紡锛夛紝鐢ㄤ簬瑙ｆ瀽 X-Forwarded-For 澶淬€傜暀绌哄垯绂佺敤浠ｇ悊淇′换銆?  trusted_proxies: []
  # Global max request body size in bytes (default: 256MB)
  # 鍏ㄥ眬鏈€澶ц姹備綋澶у皬锛堝瓧鑺傦紝榛樿 256MB锛?  # Applies to all requests, especially important for h2c first request memory protection
  # 閫傜敤浜庢墍鏈夎姹傦紝瀵?h2c 绗竴璇锋眰鐨勫唴瀛樹繚鎶ゅ挨涓洪噸瑕?  max_request_body_size: 268435456
  # HTTP/2 Cleartext (h2c) configuration
  # HTTP/2 Cleartext (h2c) 閰嶇疆
  h2c:
    # Enable HTTP/2 Cleartext for client connections
    # 鍚敤 HTTP/2 Cleartext 瀹㈡埛绔繛鎺?    enabled: true
    # Max concurrent streams per connection
    # 姣忎釜杩炴帴鐨勬渶澶у苟鍙戞祦鏁伴噺
    max_concurrent_streams: 50
    # Idle timeout for connections (seconds)
    # 杩炴帴绌洪棽瓒呮椂鏃堕棿锛堢锛?    idle_timeout: 75
    # Max frame size in bytes (default: 1MB)
    # 鏈€澶у抚澶у皬锛堝瓧鑺傦紝榛樿 1MB锛?    max_read_frame_size: 1048576
    # Max upload buffer per connection in bytes (default: 2MB)
    # 姣忎釜杩炴帴鐨勬渶澶т笂浼犵紦鍐插尯锛堝瓧鑺傦紝榛樿 2MB锛?    max_upload_buffer_per_connection: 2097152
    # Max upload buffer per stream in bytes (default: 512KB)
    # 姣忎釜娴佺殑鏈€澶т笂浼犵紦鍐插尯锛堝瓧鑺傦紝榛樿 512KB锛?    max_upload_buffer_per_stream: 524288

# =============================================================================
# Run Mode Configuration
# 杩愯妯″紡閰嶇疆
# =============================================================================
# Run mode: "standard" (default) or "simple" (for internal use)
# 杩愯妯″紡锛?standard"锛堥粯璁わ級鎴?"simple"锛堝唴閮ㄤ娇鐢級
# - standard: Full SaaS features with billing/balance checks
# - standard: 瀹屾暣 SaaS 鍔熻兘锛屽寘鍚璐瑰拰浣欓鏍￠獙
# - simple: Hides SaaS features and skips billing/balance checks
# - simple: 闅愯棌 SaaS 鍔熻兘锛岃烦杩囪璐瑰拰浣欓鏍￠獙
run_mode: "standard"

# =============================================================================
# CORS Configuration
# 璺ㄥ煙璧勬簮鍏变韩 (CORS) 閰嶇疆
# =============================================================================
cors:
  # Allowed origins list. Leave empty to disable cross-origin requests.
  # 鍏佽鐨勬潵婧愬垪琛ㄣ€傜暀绌哄垯绂佺敤璺ㄥ煙璇锋眰銆?  allowed_origins: []
  # Allow credentials (cookies/authorization headers). Cannot be used with "*".
  # 鍏佽鎼哄甫鍑瘉锛坈ookies/鎺堟潈澶达級銆備笉鑳戒笌 "*" 閫氶厤绗﹀悓鏃朵娇鐢ㄣ€?  allow_credentials: true

# =============================================================================
# Security Configuration
# 瀹夊叏閰嶇疆
# =============================================================================
security:
  url_allowlist:
    # Enable URL allowlist validation (disable to skip all URL checks)
    # 鍚敤 URL 鐧藉悕鍗曢獙璇侊紙绂佺敤鍒欒烦杩囨墍鏈?URL 妫€鏌ワ級
    enabled: false
    # Allowed upstream hosts for API proxying
    # 鍏佽浠ｇ悊鐨勪笂娓?API 涓绘満鍒楄〃
    upstream_hosts:
      - "api.openai.com"
      - "api.anthropic.com"
      - "api.kimi.com"
      - "open.bigmodel.cn"
      - "api.minimaxi.com"
      - "generativelanguage.googleapis.com"
      - "cloudcode-pa.googleapis.com"
      - "*.openai.azure.com"
    # Allowed hosts for pricing data download
    # 鍏佽涓嬭浇瀹氫环鏁版嵁鐨勪富鏈哄垪琛?    pricing_hosts:
      - "raw.githubusercontent.com"
    # Allowed hosts for CRS sync (required when using CRS sync)
    # 鍏佽 CRS 鍚屾鐨勪富鏈哄垪琛紙浣跨敤 CRS 鍚屾鍔熻兘鏃跺繀椤婚厤缃級
    crs_hosts: []
    # Allow localhost/private IPs for upstream/pricing/CRS (use only in trusted networks)
    # 鍏佽鏈湴/绉佹湁 IP 鍦板潃鐢ㄤ簬涓婃父/瀹氫环/CRS锛堜粎鍦ㄥ彲淇＄綉缁滀腑浣跨敤锛?    allow_private_hosts: true
    # Allow http:// URLs when allowlist is disabled (default: false, require https)
    # 鐧藉悕鍗曠鐢ㄦ椂鏄惁鍏佽 http:// URL锛堥粯璁? false锛岃姹?https锛?    allow_insecure_http: true
  response_headers:
    # Enable configurable response header filtering (default: true)
    # 鍚敤鍙厤缃殑鍝嶅簲澶磋繃婊わ紙榛樿鍚敤锛岃繃婊や笂娓告晱鎰熷搷搴斿ご锛?    enabled: true
    # Extra allowed response headers from upstream
    # 棰濆鍏佽鐨勪笂娓稿搷搴斿ご
    additional_allowed: []
    # Force-remove response headers from upstream
    # 寮哄埗绉婚櫎鐨勪笂娓稿搷搴斿ご
    force_remove: []
  csp:
    # Enable Content-Security-Policy header
    # 鍚敤鍐呭瀹夊叏绛栫暐 (CSP) 鍝嶅簲澶?    enabled: true
    # Default CSP policy (override if you host assets on other domains)
    # 榛樿 CSP 绛栫暐锛堝鏋滈潤鎬佽祫婧愭墭绠″湪鍏朵粬鍩熷悕锛岃鑷瑕嗙洊锛?    # Note: __CSP_NONCE__ will be replaced with 'nonce-xxx' at request time for inline script security
    # 娉ㄦ剰锛歘_CSP_NONCE__ 浼氬湪璇锋眰鏃惰鏇挎崲涓?'nonce-xxx'锛岀敤浜庡唴鑱旇剼鏈畨鍏?    policy: "default-src 'self'; script-src 'self' __CSP_NONCE__ https://challenges.cloudflare.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https:; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
  proxy_probe:
    # Allow skipping TLS verification for proxy probe (debug only)
    # 鍏佽浠ｇ悊鎺㈡祴鏃惰烦杩?TLS 璇佷功楠岃瘉锛堜粎鐢ㄤ簬璋冭瘯锛?    insecure_skip_verify: false
  proxy_fallback:
    # Allow auxiliary services (update check, pricing data) to fallback to direct
    # connection when proxy initialization fails. Does NOT affect AI gateway connections.
    # 杈呭姪鏈嶅姟锛堟洿鏂版鏌ャ€佸畾浠锋暟鎹媺鍙栵級浠ｇ悊鍒濆鍖栧け璐ユ椂鏄惁鍏佽鍥為€€鐩磋繛銆?    # 涓嶅奖鍝?AI 璐﹀彿缃戝叧杩炴帴銆傞粯璁?false锛歠ail-fast 闃叉 IP 娉勯湶銆?    allow_direct_on_error: false

# =============================================================================
# Gateway Configuration
# 缃戝叧閰嶇疆
# =============================================================================
gateway:
  # Timeout for waiting upstream response headers (seconds)
  # 绛夊緟涓婃父鍝嶅簲澶磋秴鏃舵椂闂达紙绉掞級
  response_header_timeout: 600
  # Max request body size in bytes (default: 256MB)
  # 璇锋眰浣撴渶澶у瓧鑺傛暟锛堥粯璁?256MB锛?  max_body_size: 268435456
  # Max bytes to read for non-stream upstream responses (default: 8MB)
  # 闈炴祦寮忎笂娓稿搷搴斾綋璇诲彇涓婇檺锛堥粯璁?8MB锛?  upstream_response_read_max_bytes: 8388608
  # Max bytes to read for proxy probe responses (default: 1MB)
  # 浠ｇ悊鎺㈡祴鍝嶅簲浣撹鍙栦笂闄愶紙榛樿 1MB锛?  proxy_probe_response_read_max_bytes: 1048576
  # Enable Gemini upstream response header debug logs (default: false)
  # 鏄惁寮€鍚?Gemini 涓婃父鍝嶅簲澶磋皟璇曟棩蹇楋紙榛樿 false锛?  gemini_debug_response_headers: false
  # Sora max request body size in bytes (0=use max_body_size)
  # Sora 璇锋眰浣撴渶澶у瓧鑺傛暟锛?=浣跨敤 max_body_size锛?  sora_max_body_size: 268435456
  # Sora stream timeout (seconds, 0=disable)
  # Sora 娴佸紡璇锋眰鎬昏秴鏃讹紙绉掞紝0=绂佺敤锛?  sora_stream_timeout_seconds: 900
  # Sora non-stream timeout (seconds, 0=disable)
  # Sora 闈炴祦寮忚姹傝秴鏃讹紙绉掞紝0=绂佺敤锛?  sora_request_timeout_seconds: 180
  # Sora stream enforcement mode: force/error
  # Sora stream 寮哄埗绛栫暐锛歠orce/error
  sora_stream_mode: "force"
  # Sora model filters
  # Sora 妯″瀷杩囨护閰嶇疆
  sora_model_filters:
    # Hide prompt-enhance models by default
    # 榛樿闅愯棌 prompt-enhance 妯″瀷
    hide_prompt_enhance: true
  # Require API key for /sora/media proxy (default: false)
  # /sora/media 鏄惁寮哄埗瑕佹眰 API Key锛堥粯璁?true锛?  sora_media_require_api_key: true
  # Sora media temporary signing key (empty disables signed URL)
  # Sora 濯掍綋涓存椂绛惧悕瀵嗛挜锛堜负绌哄垯绂佺敤绛惧悕锛?  sora_media_signing_key: ""
  # Signed URL TTL seconds (<=0 disables)
  # 涓存椂绛惧悕 URL 鏈夋晥鏈燂紙绉掞紝<=0 琛ㄧず绂佺敤锛?  sora_media_signed_url_ttl_seconds: 900
  # Connection pool isolation strategy:
  # 杩炴帴姹犻殧绂荤瓥鐣ワ細
  # - proxy: Isolate by proxy, same proxy shares connection pool (suitable for few proxies, many accounts)
  # - proxy: 鎸変唬鐞嗛殧绂伙紝鍚屼竴浠ｇ悊鍏变韩杩炴帴姹狅紙閫傚悎浠ｇ悊灏戙€佽处鎴峰锛?  # - account: Isolate by account, same account shares connection pool (suitable for few accounts, strict isolation)
  # - account: 鎸夎处鎴烽殧绂伙紝鍚屼竴璐︽埛鍏变韩杩炴帴姹狅紙閫傚悎璐︽埛灏戙€侀渶涓ユ牸闅旂锛?  # - account_proxy: Isolate by account+proxy combination (default, finest granularity)
  # - account_proxy: 鎸夎处鎴?浠ｇ悊缁勫悎闅旂锛堥粯璁わ紝鏈€缁嗙矑搴︼級
  connection_pool_isolation: "account_proxy"
  # Force Codex CLI mode: treat all /openai/v1/responses requests as Codex CLI.
  # 寮哄埗鎸?Codex CLI 澶勭悊 /openai/v1/responses 璇锋眰锛堢敤浜庣綉鍏虫湭閫忎紶/鏀瑰啓 User-Agent 鐨勫厹搴曪級銆?  #
  # 娉ㄦ剰锛氬紑鍚悗浼氬奖鍝嶆墍鏈夊鎴风鐨勮涓猴紙涓嶄粎闄愪簬 VS Code / Codex CLI锛夛紝璇疯皑鎱庡紑鍚€?  force_codex_cli: false
  # Enable Codex image-generation bridge injection for /openai/v1/responses.
  # 鏄惁涓?Codex /responses 璇锋眰鑷姩娉ㄥ叆 image_generation 宸ュ叿涓庢ˉ鎺ユ寚浠ゃ€?  #
  # Default false keeps text-only Codex requests text-only. Explicit client-provided
  # image_generation tools are still forwarded when the group allows image generation.
  # 榛樿 false锛氫繚鎸佺函鏂囨湰 Codex 璇锋眰涓嶈鏀瑰啓锛涘鎴风鏄惧紡鎻愪緵 image_generation tool 鏃讹紝
  # 浠嶄細鍦ㄥ垎缁勫厑璁稿浘鐗囩敓鎴愮殑鎯呭喌涓嬫甯歌浆鍙戙€?  codex_image_generation_bridge_enabled: false
  # Optional: template file used to build the final top-level Codex `instructions`.
  # 鍙€夛細鐢ㄤ簬鏋勫缓鏈€缁?Codex 椤跺眰 `instructions` 鐨勬ā鏉挎枃浠惰矾寰勩€?  #
  # This is applied on the `/v1/messages -> Responses/Codex` conversion path,
  # after Claude `system` has already been normalized into Codex `instructions`.
  # 璇ユā鏉夸綔鐢ㄤ簬 `/v1/messages -> Responses/Codex` 杞崲閾捐矾锛屼笖鍙戠敓鍦?Claude `system`
  # 宸茬粡琚綊涓€鍖栦负 Codex `instructions` 涔嬪悗銆?  #
  # The template can reference:
  # 妯℃澘鍙紩鐢細
  # - {{ .ExistingInstructions }} : converted client instructions/system
  # - {{ .OriginalModel }}        : original requested model
  # - {{ .NormalizedModel }}      : normalized routing model
  # - {{ .BillingModel }}         : billing model
  # - {{ .UpstreamModel }}        : final upstream model
  #
  # If you want to preserve client system prompts, keep {{ .ExistingInstructions }}
  # somewhere in the template. If omitted, the template output fully replaces it.
  # 濡傞渶淇濈暀瀹㈡埛绔?system 鎻愮ず璇嶏紝璇峰湪妯℃澘涓樉寮忓寘鍚?{{ .ExistingInstructions }}銆?  # 鑻ョ渷鐣ワ紝鍒欐ā鏉胯緭鍑轰細瀹屽叏瑕嗙洊瀹冦€?  #
  # Docker users can mount a host file to /app/data/codex-instructions.md.tmpl
  # and point this field there.
  # Docker 鐢ㄦ埛鍙皢瀹夸富鏈烘枃浠舵寕杞藉埌 /app/data/codex-instructions.md.tmpl锛?  # 鐒跺悗鎶婃湰瀛楁鎸囧悜璇ヨ矾寰勩€?  forced_codex_instructions_template_file: ""
  # OpenAI 閫忎紶妯″紡鏄惁鏀捐瀹㈡埛绔秴鏃跺ご锛堝 x-stainless-timeout锛?  # 榛樿 false锛氳繃婊よ秴鏃跺ご锛岄檷浣庝笂娓告彁鍓嶆柇娴侀闄┿€?  openai_passthrough_allow_timeout_headers: false
  # OpenAI Responses WebSocket 閰嶇疆锛堥粯璁ゅ紑鍚紝鍙寜闇€鍥炴粴鍒?HTTP锛?  openai_ws:
    # 鏂扮増 WS mode 璺敱锛堥粯璁ゅ叧闂級銆傚叧闂椂淇濇寔褰撳墠 legacy 瀹炵幇琛屼负銆?    mode_router_v2_enabled: false
    # ingress 榛樿妯″紡锛歰ff|ctx_pool|passthrough锛堜粎 mode_router_v2_enabled=true 鐢熸晥锛?    # 鍏煎鏃у€硷細shared/dedicated 浼氭寜 ctx_pool 澶勭悊銆?    ingress_mode_default: ctx_pool
    # 鍏ㄥ眬鎬诲紑鍏筹紝榛樿 true锛涘叧闂椂鎵€鏈夎姹備繚鎸佸師鏈?HTTP/SSE 璺敱
    enabled: true
    # 鎸夎处鍙风被鍨嬬粏鍒嗗紑鍏?    oauth_enabled: true
    apikey_enabled: true
    # 鍏ㄥ眬寮哄埗 HTTP锛堢揣鎬ュ洖婊氬紑鍏筹級
    force_http: false
    # 鍏佽鍦?WSv2 涓嬫寜绛栫暐鎭㈠ store=true锛堥粯璁?false锛?    allow_store_recovery: false
    # ingress 妯″紡鏀跺埌 previous_response_not_found 鏃讹紝鑷姩鍘绘帀 previous_response_id 閲嶈瘯涓€娆★紙榛樿 true锛?    ingress_previous_response_recovery_enabled: true
    # store=false 涓旀棤鍙鐢ㄤ細璇濊繛鎺ユ椂鐨勭瓥鐣ワ細
    # strict=寮哄埗鏂板缓杩炴帴锛堥殧绂讳紭鍏堬級锛宎daptive=浠呭湪楂橀闄╁け璐ュ悗寮哄埗鏂板缓锛宱ff=灏介噺澶嶇敤锛堟€ц兘浼樺厛锛?    store_disabled_conn_mode: strict
    # store=false 涓旀棤鍙鐢ㄤ細璇濊繛鎺ユ椂锛屾槸鍚﹀己鍒舵柊寤鸿繛鎺ワ紙榛樿 true锛屼紭鍏堜細璇濋殧绂伙級
    # 鍏煎鏃ч厤缃細浠呭湪 store_disabled_conn_mode 鏈厤缃椂鐢熸晥
    store_disabled_force_new_conn: true
    # 鏄惁鍚敤 WSv2 generate=false 棰勭儹锛堥粯璁?false锛?    prewarm_generate_enabled: false
    # 鍗忚 feature 寮€鍏筹紝v2 浼樺厛浜?v1
    responses_websockets: false
    responses_websockets_v2: true
    # 杩炴帴姹犲弬鏁帮紙鎸夎处鍙锋睜鍖栧鐢級
    max_conns_per_account: 128
    min_idle_per_account: 4
    max_idle_per_account: 12
    # 鏄惁鎸夎处鍙峰苟鍙戝姩鎬佽绠楄繛鎺ユ睜涓婇檺锛?    # effective_max_conns = min(max_conns_per_account, ceil(account.concurrency * factor))
    dynamic_max_conns_by_account_concurrency_enabled: true
    # 鎸夎处鍙风被鍨嬪垎鍒缃郴鏁帮紙OAuth / API Key锛?    oauth_max_conns_factor: 1.0
    apikey_max_conns_factor: 1.0
    dial_timeout_seconds: 10
