    # Thereafter keep 1 out of N entries per second
    # 涔嬪悗姣?N 鏉′繚鐣?1 鏉?    thereafter: 100

# =============================================================================
# Sora Direct Client Configuration
# Sora 鐩磋繛閰嶇疆
# =============================================================================
sora:
  client:
    # Sora backend base URL
    # Sora 涓婃父 Base URL
    base_url: "https://sora.chatgpt.com/backend"
    # Request timeout (seconds)
    # 璇锋眰瓒呮椂锛堢锛?    timeout_seconds: 120
    # Max retries for upstream requests
    # 涓婃父璇锋眰鏈€澶ч噸璇曟鏁?    max_retries: 3
    # Account+proxy cooldown window after Cloudflare challenge (seconds, 0 to disable)
    # Cloudflare challenge 鍚庢寜璐﹀彿+浠ｇ悊鍐峰嵈绐楀彛锛堢锛? 琛ㄧず鍏抽棴锛?    cloudflare_challenge_cooldown_seconds: 900
    # Poll interval (seconds)
    # 杞闂撮殧锛堢锛?    poll_interval_seconds: 2
    # Max poll attempts
    # 鏈€澶ц疆璇㈡鏁?    max_poll_attempts: 600
    # Recent task query limit (image)
    # 鏈€杩戜换鍔℃煡璇㈡暟閲忥紙鍥剧墖杞锛?    recent_task_limit: 50
    # Recent task query max limit (fallback)
    # 鏈€杩戜换鍔℃煡璇㈡渶澶ф暟閲忥紙鍥為€€锛?    recent_task_limit_max: 200
    # Enable debug logs for Sora upstream requests
    # 鍚敤 Sora 鐩磋繛璋冭瘯鏃ュ織
    # 璋冭瘯鏃ュ織浼氳緭鍑轰笂娓歌姹傚皾璇曘€侀噸璇曘€佸搷搴旀憳瑕侊紱Authorization/openai-sentinel-token 绛夋晱鎰熷ご浼氳嚜鍔ㄨ劚鏁?    debug: false
    # Allow Sora client to fetch token via OpenAI token provider
    # 鏄惁鍏佽 Sora 瀹㈡埛绔€氳繃 OpenAI token provider 鍙?token锛堥粯璁?false锛岄伩鍏嶈璧?OpenAI 鍒锋柊閾捐矾锛?    use_openai_token_provider: false
    # Optional custom headers (key-value)
    # 棰濆璇锋眰澶达紙閿€煎锛?    headers: {}
    # Default User-Agent for Sora requests
    # Sora 榛樿 User-Agent
    user_agent: "Sora/1.2026.007 (Android 15; 24122RKC7C; build 2600700)"
    # Disable TLS fingerprint for Sora upstream
    # 鍏抽棴 Sora 涓婃父 TLS 鎸囩汗浼
    disable_tls_fingerprint: false
    # curl_cffi sidecar for Sora only (required)
    # 浠?Sora 閾捐矾浣跨敤鐨?curl_cffi sidecar锛堝繀闇€锛?    curl_cffi_sidecar:
      # Sora 寮哄埗閫氳繃 sidecar 璇锋眰锛屽繀椤诲惎鐢?      # Sora is forced to use sidecar only; keep enabled=true
      enabled: true
      # Sidecar base URL (default endpoint: /request)
      # sidecar 鍩虹鍦板潃锛堥粯璁よ姹傜鐐癸細/request锛?      base_url: "http://sora-curl-cffi-sidecar:8080"
      # curl_cffi impersonate profile, e.g. chrome131/chrome124/safari18_0
      # curl_cffi 鎸囩汗浼 profile锛屼緥濡?chrome131/chrome124/safari18_0
      impersonate: "chrome131"
      # Sidecar request timeout (seconds)
      # sidecar 璇锋眰瓒呮椂锛堢锛?      timeout_seconds: 60
      # Reuse session key per account+proxy to let sidecar persist cookies/session
      # 鎸夎处鍙?浠ｇ悊澶嶇敤 session key锛岃 sidecar 鎸佷箙鍖?cookies/session
      session_reuse_enabled: true
      # Session TTL in sidecar (seconds)
      # sidecar 浼氳瘽 TTL锛堢锛?      session_ttl_seconds: 3600
  storage:
    # Storage type (local only for now)
    # 瀛樺偍绫诲瀷锛堥鍙戜粎鏀寔 local锛?    type: "local"
    # Local base path; empty uses /app/data/sora
    # 鏈湴瀛樺偍鍩虹璺緞锛涗负绌轰娇鐢?/app/data/sora
    local_path: ""
    # Fallback to upstream URL when download fails
    # 涓嬭浇澶辫触鏃跺洖閫€鍒颁笂娓?URL
    fallback_to_upstream: true
    # Max concurrent downloads
    # 骞跺彂涓嬭浇涓婇檺
    max_concurrent_downloads: 4
    # Download timeout (seconds)
    # 涓嬭浇瓒呮椂锛堢锛?    download_timeout_seconds: 120
    # Max download bytes
    # 鏈€澶т笅杞藉瓧鑺傛暟
    max_download_bytes: 209715200
    # Enable debug logs for media storage
    # 鍚敤濯掍綋瀛樺偍璋冭瘯鏃ュ織
    debug: false
    cleanup:
      # Enable cleanup task
      # 鍚敤娓呯悊浠诲姟
      enabled: true
      # Retention days
      # 淇濈暀澶╂暟
