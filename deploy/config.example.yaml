turnstile:
  # Require Turnstile in release mode (when enabled, login/register will fail if not configured)
  # 鍦?release 妯″紡涓嬭姹?Turnstile 楠岃瘉锛堝惎鐢ㄥ悗锛岃嫢鏈厤缃垯鐧诲綍/娉ㄥ唽浼氬け璐ワ級
  required: false

# =============================================================================
# Gemini OAuth (Required for Gemini accounts)
# Gemini OAuth 閰嶇疆锛圙emini 璐︽埛蹇呴渶锛?# =============================================================================
# Nexora supports TWO Gemini OAuth modes:
# Nexora 鏀寔涓ょ Gemini OAuth 妯″紡锛?#
# 1. Code Assist OAuth (requires GCP project_id)
# 1. Code Assist OAuth锛堥渶瑕?GCP project_id锛?#    - Uses: cloudcode-pa.googleapis.com (Code Assist API)
#    - 浣跨敤锛歝loudcode-pa.googleapis.com锛圕ode Assist API锛?#
# 2. AI Studio OAuth (no project_id needed)
# 2. AI Studio OAuth锛堜笉闇€瑕?project_id锛?#    - Uses: generativelanguage.googleapis.com (AI Studio API)
#    - 浣跨敤锛歡enerativelanguage.googleapis.com锛圓I Studio API锛?#
# Default: Uses Gemini CLI's public OAuth credentials (same as Google's official CLI tool)
# 榛樿锛氫娇鐢?Gemini CLI 鐨勫叕寮€ OAuth 鍑瘉锛堜笌 Google 瀹樻柟 CLI 宸ュ叿鐩稿悓锛?gemini:
  oauth:
    # OAuth 瀹㈡埛绔厤缃鏄庯細
    # 1) 鐣欑┖ client_id/client_secret锛氫娇鐢?Gemini CLI 鍐呯疆 OAuth Client锛堝叾 client_secret 闇€閫氳繃鐜鍙橀噺娉ㄥ叆锛?    #    - GEMINI_CLI_OAUTH_CLIENT_SECRET
    # 2) 鍚屾椂璁剧疆 client_id/client_secret锛氫娇鐢ㄤ綘鑷缓鐨?OAuth Client锛堟帹鑽愶紝鏉冮檺鏇村畬鏁达級
    #
    # 娉ㄦ剰锛歝lient_id 涓?client_secret 蹇呴』鍚屾椂涓虹┖鎴栧悓鏃堕潪绌恒€?    client_id: ""
    client_secret: ""
    # Optional scopes (space-separated). Leave empty to auto-select based on oauth_type.
    # 鍙€夌殑鏉冮檺鑼冨洿锛堢┖鏍煎垎闅旓級銆傜暀绌哄垯鏍规嵁 oauth_type 鑷姩閫夋嫨銆?    scopes: ""
  quota:
    # Optional: local quota simulation for Gemini Code Assist (local billing).
    # 鍙€夛細Gemini Code Assist 鏈湴閰嶉妯℃嫙锛堟湰鍦拌璐癸級銆?    # These values are used for UI progress + precheck scheduling, not official Google quotas.
    # 杩欎簺鍊肩敤浜?UI 杩涘害鏄剧ず鍜岄妫€璋冨害锛屽苟闈?Google 瀹樻柟閰嶉銆?    tiers:
      LEGACY:
        # Pro model requests per day
        # Pro 妯″瀷姣忔棩璇锋眰鏁?        pro_rpd: 50
        # Flash model requests per day
        # Flash 妯″瀷姣忔棩璇锋眰鏁?        flash_rpd: 1500
        # Cooldown time (minutes) after hitting quota
        # 杈惧埌閰嶉鍚庣殑鍐峰嵈鏃堕棿锛堝垎閽燂級
        cooldown_minutes: 30
      PRO:
        # Pro model requests per day
        # Pro 妯″瀷姣忔棩璇锋眰鏁?        pro_rpd: 1500
        # Flash model requests per day
        # Flash 妯″瀷姣忔棩璇锋眰鏁?        flash_rpd: 4000
        # Cooldown time (minutes) after hitting quota
        # 杈惧埌閰嶉鍚庣殑鍐峰嵈鏃堕棿锛堝垎閽燂級
        cooldown_minutes: 5
      ULTRA:
        # Pro model requests per day
        # Pro 妯″瀷姣忔棩璇锋眰鏁?        pro_rpd: 2000
        # Flash model requests per day (0 = unlimited)
        # Flash 妯″瀷姣忔棩璇锋眰鏁帮紙0 = 鏃犻檺鍒讹級
        flash_rpd: 0
        # Cooldown time (minutes) after hitting quota
        # 杈惧埌閰嶉鍚庣殑鍐峰嵈鏃堕棿锛堝垎閽燂級
        cooldown_minutes: 5

# =============================================================================
# Update Configuration (鍦ㄧ嚎鏇存柊閰嶇疆)
# =============================================================================
update:
  # GitHub release repository used by online updates.
  # Use your branded fork here to keep custom UI after updates.
  # Format: owner/repo
  github_repo: "Wei-Shaw/sub2api"

  # Proxy URL for accessing GitHub (used for online updates and pricing data)
  # 鐢ㄤ簬璁块棶 GitHub 鐨勪唬鐞嗗湴鍧€锛堢敤浜庡湪绾挎洿鏂板拰瀹氫环鏁版嵁鑾峰彇锛?  # Supports: http, https, socks5, socks5h
  # Examples:
  #   - HTTP proxy: "http://127.0.0.1:7890"
  #   - SOCKS5 proxy: "socks5://127.0.0.1:1080"
  #   - With authentication: "http://user:pass@proxy.example.com:8080"
  # Leave empty for direct connection (recommended for overseas servers)
  # 鐣欑┖琛ㄧず鐩磋繛锛堥€傜敤浜庢捣澶栨湇鍔″櫒锛?  proxy_url: ""
