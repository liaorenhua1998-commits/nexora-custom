    event_flush_batch_size: 1
    event_flush_interval_ms: 10
    # 棰勭儹瑙﹀彂鍐峰嵈锛堟绉掞級
    prewarm_cooldown_ms: 300
    # WS 鍥為€€鍒?HTTP 鍚庣殑鍐峰嵈鏃堕棿锛堢锛夛紝鐢ㄤ簬閬垮厤 WS/HTTP 鏉ュ洖鎶栧姩锛? 琛ㄧず鍏抽棴鍐峰嵈
    fallback_cooldown_seconds: 30
    # WS 閲嶈瘯閫€閬垮弬鏁帮紙姣锛?    retry_backoff_initial_ms: 120
    retry_backoff_max_ms: 2000
    # 鎶栧姩姣斾緥锛?-1锛?    retry_jitter_ratio: 0.2
    # 鍗曟璇锋眰 WS 閲嶈瘯鎬婚绠楋紙姣锛夛紱寤鸿璁剧疆涓烘湁闄愬€硷紝閬垮厤閲嶈瘯鎷夐珮 TTFT 闀垮熬
    retry_total_budget_ms: 5000
    # payload_schema 鏃ュ織閲囨牱鐜囷紙0-1锛夛紱闄嶄綆鐑矾寰勬棩蹇楁斁澶?    payload_log_sample_rate: 0.2
    # 璋冨害涓庣矘杩炲弬鏁?    lb_top_k: 7
    sticky_session_ttl_seconds: 3600
    # 浼氳瘽鍝堝笇杩佺Щ鍏煎寮€鍏筹細鏂?key 鏈懡涓椂鍥為€€璇诲彇鏃?SHA-256 key
    session_hash_read_old_fallback: true
    # 浼氳瘽鍝堝笇杩佺Щ鍏煎寮€鍏筹細鍐欏叆鏃跺弻鍐欐棫 SHA-256 key锛堢煭 TTL锛?    session_hash_dual_write_old: true
    # context 鍏冩暟鎹縼绉诲吋瀹瑰紑鍏筹細淇濈暀鏃?ctxkey.* 璇诲彇/娉ㄥ叆妗ユ帴
    metadata_bridge_enabled: true
    sticky_response_id_ttl_seconds: 3600
    # 鍏煎鏃ч敭锛氬綋 sticky_response_id_ttl_seconds 缂哄け鏃跺洖閫€璇ュ€?    sticky_previous_response_ttl_seconds: 3600
    scheduler_score_weights:
      priority: 1.0
      load: 1.0
      queue: 0.7
      error_rate: 0.8
      ttft: 0.5
  # HTTP upstream connection pool settings (HTTP/2 + multi-proxy scenario defaults)
  # HTTP 涓婃父杩炴帴姹犻厤缃紙HTTP/2 + 澶氫唬鐞嗗満鏅粯璁ゅ€硷級
  # Max idle connections across all hosts
  # 鎵€鏈変富鏈虹殑鏈€澶х┖闂茶繛鎺ユ暟
  max_idle_conns: 2560
  # Max idle connections per host
  # 姣忎釜涓绘満鐨勬渶澶х┖闂茶繛鎺ユ暟
  max_idle_conns_per_host: 120
  # Max connections per host
  # 姣忎釜涓绘満鐨勬渶澶ц繛鎺ユ暟
  max_conns_per_host: 1024
  # Idle connection timeout (seconds)
  # 绌洪棽杩炴帴瓒呮椂鏃堕棿锛堢锛?  idle_conn_timeout_seconds: 90
  # Upstream client cache settings
  # 涓婃父杩炴帴姹犲鎴风缂撳瓨閰嶇疆
  # max_upstream_clients: Max cached clients, evicts least recently used when exceeded
  # max_upstream_clients: 鏈€澶х紦瀛樺鎴风鏁伴噺锛岃秴鍑哄悗娣樻卑鏈€涔呮湭浣跨敤鐨?  max_upstream_clients: 5000
  # client_idle_ttl_seconds: Client idle reclaim threshold (seconds), reclaimed when idle and no active requests
  # client_idle_ttl_seconds: 瀹㈡埛绔┖闂插洖鏀堕槇鍊硷紙绉掞級锛岃秴鏃朵笖鏃犳椿璺冭姹傛椂鍥炴敹
  client_idle_ttl_seconds: 900
  # Concurrency slot expiration time (minutes)
