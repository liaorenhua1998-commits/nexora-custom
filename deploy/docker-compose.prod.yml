# =============================================================================
# Nexora Docker Compose - Production Profile
# =============================================================================
# Intended for public internet deployments behind a host reverse proxy.
#
# Usage:
#   ./docker-deploy-prod.sh
#   docker compose --env-file ./runtime/.env.production -f docker-compose.prod.yml up -d --build
#
# Production characteristics:
#   - Binds Nexora to 127.0.0.1 by default (put Nginx/Caddy in front)
#   - Does not expose PostgreSQL or Redis to the public internet
#   - Loads secrets from runtime files mounted as Docker secrets
#   - Uses bind-mounted local directories for data, logs, and backup/restore
# =============================================================================

services:
  nexora:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: nexora/gateway:prod
    container_name: nexora
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    ports:
      - "${BIND_HOST:-127.0.0.1}:${SERVER_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
    secrets:
      - postgres_password
      - redis_password
      - admin_password
      - jwt_secret
      - totp_encryption_key
      - turnstile_secret_key
      - smtp_password
    environment:
      - AUTO_SETUP=${AUTO_SETUP:-true}

      # Server
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=release
      - RUN_MODE=${RUN_MODE:-standard}
      - TZ=${TZ:-Asia/Hong_Kong}
      - SERVER_TRUSTED_PROXIES=${SERVER_TRUSTED_PROXIES:-127.0.0.1/32,::1/128}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_SERVICE_NAME=${LOG_SERVICE_NAME:-nexora-gateway}
      - LOG_ENV=${LOG_ENV:-production}
      - LOG_CALLER=${LOG_CALLER:-true}
      - LOG_STACKTRACE_LEVEL=${LOG_STACKTRACE_LEVEL:-error}
      - LOG_OUTPUT_TO_STDOUT=${LOG_OUTPUT_TO_STDOUT:-true}
      - LOG_OUTPUT_TO_FILE=${LOG_OUTPUT_TO_FILE:-true}
      - LOG_OUTPUT_FILE_PATH=${LOG_OUTPUT_FILE_PATH:-}
      - LOG_ROTATION_MAX_SIZE_MB=${LOG_ROTATION_MAX_SIZE_MB:-100}
      - LOG_ROTATION_MAX_BACKUPS=${LOG_ROTATION_MAX_BACKUPS:-10}
      - LOG_ROTATION_MAX_AGE_DAYS=${LOG_ROTATION_MAX_AGE_DAYS:-7}
      - LOG_ROTATION_COMPRESS=${LOG_ROTATION_COMPRESS:-true}
      - LOG_ROTATION_LOCAL_TIME=${LOG_ROTATION_LOCAL_TIME:-true}

      # Request sizing
      - SERVER_MAX_REQUEST_BODY_SIZE=${SERVER_MAX_REQUEST_BODY_SIZE:-268435456}
      - GATEWAY_MAX_BODY_SIZE=${GATEWAY_MAX_BODY_SIZE:-268435456}

      # PostgreSQL
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - DATABASE_PASSWORD_FILE=/run/secrets/postgres_password
      - DATABASE_DBNAME=${POSTGRES_DB:?POSTGRES_DB is required}
      - DATABASE_SSLMODE=disable
      - DATABASE_MAX_OPEN_CONNS=${DATABASE_MAX_OPEN_CONNS:-80}
      - DATABASE_MAX_IDLE_CONNS=${DATABASE_MAX_IDLE_CONNS:-20}
      - DATABASE_CONN_MAX_LIFETIME_MINUTES=${DATABASE_CONN_MAX_LIFETIME_MINUTES:-30}
      - DATABASE_CONN_MAX_IDLE_TIME_MINUTES=${DATABASE_CONN_MAX_IDLE_TIME_MINUTES:-5}

      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-512}
      - REDIS_MIN_IDLE_CONNS=${REDIS_MIN_IDLE_CONNS:-32}
      - REDIS_ENABLE_TLS=${REDIS_ENABLE_TLS:-false}

      # Bootstrap admin
      - ADMIN_EMAIL=${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      - ADMIN_PASSWORD_FILE=/run/secrets/admin_password

      # Auth / 2FA
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - JWT_EXPIRE_HOUR=${JWT_EXPIRE_HOUR:-24}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-0}
      - TOTP_ENCRYPTION_KEY_FILE=/run/secrets/totp_encryption_key

      # OAuth / upstream integration
      - GEMINI_OAUTH_CLIENT_ID=${GEMINI_OAUTH_CLIENT_ID:-}
      - GEMINI_OAUTH_CLIENT_SECRET=${GEMINI_OAUTH_CLIENT_SECRET:-}
      - GEMINI_OAUTH_SCOPES=${GEMINI_OAUTH_SCOPES:-}
      - GEMINI_QUOTA_POLICY=${GEMINI_QUOTA_POLICY:-}
      - GEMINI_CLI_OAUTH_CLIENT_ID=${GEMINI_CLI_OAUTH_CLIENT_ID:-}
      - GEMINI_CLI_OAUTH_CLIENT_SECRET=${GEMINI_CLI_OAUTH_CLIENT_SECRET:-}
      - ANTIGRAVITY_OAUTH_CLIENT_ID=${ANTIGRAVITY_OAUTH_CLIENT_ID:-}
      - ANTIGRAVITY_OAUTH_CLIENT_SECRET=${ANTIGRAVITY_OAUTH_CLIENT_SECRET:-}

      # Security
      - SECURITY_URL_ALLOWLIST_ENABLED=${SECURITY_URL_ALLOWLIST_ENABLED:-true}
      - SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP=${SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP:-false}
      - SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS=${SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS:-false}
      - SECURITY_URL_ALLOWLIST_UPSTREAM_HOSTS=${SECURITY_URL_ALLOWLIST_UPSTREAM_HOSTS:-}
      - SECURITY_URL_ALLOWLIST_PRICING_HOSTS=${SECURITY_URL_ALLOWLIST_PRICING_HOSTS:-}
      - SECURITY_URL_ALLOWLIST_CRS_HOSTS=${SECURITY_URL_ALLOWLIST_CRS_HOSTS:-}

      # Startup bootstrap for DB-backed production settings
      - BOOTSTRAP_SETTINGS_ENABLED=${BOOTSTRAP_SETTINGS_ENABLED:-true}
      - BOOTSTRAP_SETTINGS_ENFORCE=${BOOTSTRAP_SETTINGS_ENFORCE:-true}
      - BOOTSTRAP_FRONTEND_URL=${BOOTSTRAP_FRONTEND_URL:-}
      - BOOTSTRAP_API_BASE_URL=${BOOTSTRAP_API_BASE_URL:-}
      - BOOTSTRAP_CONTACT_INFO=${BOOTSTRAP_CONTACT_INFO:-}
      - BOOTSTRAP_DOC_URL=${BOOTSTRAP_DOC_URL:-}
      - BOOTSTRAP_REGISTRATION_MODE=${BOOTSTRAP_REGISTRATION_MODE:-invite_only}
      - BOOTSTRAP_EMAIL_VERIFY_ENABLED=${BOOTSTRAP_EMAIL_VERIFY_ENABLED:-false}
      - BOOTSTRAP_PASSWORD_RESET_ENABLED=${BOOTSTRAP_PASSWORD_RESET_ENABLED:-false}
      - BOOTSTRAP_PROMO_CODE_ENABLED=${BOOTSTRAP_PROMO_CODE_ENABLED:-false}
      - BOOTSTRAP_INVITATION_CODE_ENABLED=${BOOTSTRAP_INVITATION_CODE_ENABLED:-true}
      - BOOTSTRAP_RISK_CONTROL_ENABLED=${BOOTSTRAP_RISK_CONTROL_ENABLED:-true}
      - BOOTSTRAP_TOTP_ENABLED=${BOOTSTRAP_TOTP_ENABLED:-true}
      - BOOTSTRAP_TURNSTILE_ENABLED=${BOOTSTRAP_TURNSTILE_ENABLED:-false}
      - BOOTSTRAP_TURNSTILE_SITE_KEY=${BOOTSTRAP_TURNSTILE_SITE_KEY:-}
      - BOOTSTRAP_TURNSTILE_SECRET_KEY_FILE=/run/secrets/turnstile_secret_key
      - BOOTSTRAP_SMTP_HOST=${BOOTSTRAP_SMTP_HOST:-}
      - BOOTSTRAP_SMTP_PORT=${BOOTSTRAP_SMTP_PORT:-587}
      - BOOTSTRAP_SMTP_USERNAME=${BOOTSTRAP_SMTP_USERNAME:-}
      - BOOTSTRAP_SMTP_PASSWORD_FILE=/run/secrets/smtp_password
      - BOOTSTRAP_SMTP_FROM_EMAIL=${BOOTSTRAP_SMTP_FROM_EMAIL:-}
      - BOOTSTRAP_SMTP_FROM_NAME=${BOOTSTRAP_SMTP_FROM_NAME:-Nexora Alerts}
      - BOOTSTRAP_SMTP_USE_TLS=${BOOTSTRAP_SMTP_USE_TLS:-true}

      # Ops alert bootstrap
      - BOOTSTRAP_OPS_SETTINGS_ENABLED=${BOOTSTRAP_OPS_SETTINGS_ENABLED:-true}
      - BOOTSTRAP_OPS_ALERT_EMAIL_ENABLED=${BOOTSTRAP_OPS_ALERT_EMAIL_ENABLED:-false}
      - BOOTSTRAP_OPS_ALERT_EMAIL_RECIPIENTS=${BOOTSTRAP_OPS_ALERT_EMAIL_RECIPIENTS:-}
      - BOOTSTRAP_OPS_ALERT_EMAIL_RATE_LIMIT_PER_HOUR=${BOOTSTRAP_OPS_ALERT_EMAIL_RATE_LIMIT_PER_HOUR:-12}
      - BOOTSTRAP_OPS_ALERT_EMAIL_BATCHING_WINDOW_SECONDS=${BOOTSTRAP_OPS_ALERT_EMAIL_BATCHING_WINDOW_SECONDS:-60}
      - BOOTSTRAP_OPS_ALERT_INCLUDE_RESOLVED=${BOOTSTRAP_OPS_ALERT_INCLUDE_RESOLVED:-false}
      - BOOTSTRAP_OPS_ALERT_RULES_ENABLED=${BOOTSTRAP_OPS_ALERT_RULES_ENABLED:-true}
      - BOOTSTRAP_OPS_ALERT_RULES_ENFORCE=${BOOTSTRAP_OPS_ALERT_RULES_ENFORCE:-true}
      - BOOTSTRAP_OPS_ERROR_RATE_THRESHOLD=${BOOTSTRAP_OPS_ERROR_RATE_THRESHOLD:-5}
      - BOOTSTRAP_OPS_UPSTREAM_ERROR_RATE_THRESHOLD=${BOOTSTRAP_OPS_UPSTREAM_ERROR_RATE_THRESHOLD:-5}
      - BOOTSTRAP_OPS_SUCCESS_RATE_THRESHOLD=${BOOTSTRAP_OPS_SUCCESS_RATE_THRESHOLD:-99}
      - BOOTSTRAP_OPS_SLA_PERCENT_MIN=${BOOTSTRAP_OPS_SLA_PERCENT_MIN:-99.5}
      - BOOTSTRAP_OPS_TTFT_P99_MS_MAX=${BOOTSTRAP_OPS_TTFT_P99_MS_MAX:-500}

      # Network access for update / pricing jobs
      - UPDATE_GITHUB_REPO=${UPDATE_GITHUB_REPO:-liaorenhua1998-commits/nexora-custom}
      - UPDATE_PROXY_URL=${UPDATE_PROXY_URL:-}

      # Optional image stream / concurrency tuning
      - GATEWAY_IMAGE_STREAM_DATA_INTERVAL_TIMEOUT=${GATEWAY_IMAGE_STREAM_DATA_INTERVAL_TIMEOUT:-900}
      - GATEWAY_IMAGE_STREAM_KEEPALIVE_INTERVAL=${GATEWAY_IMAGE_STREAM_KEEPALIVE_INTERVAL:-10}
      - GATEWAY_IMAGE_CONCURRENCY_ENABLED=${GATEWAY_IMAGE_CONCURRENCY_ENABLED:-false}
      - GATEWAY_IMAGE_CONCURRENCY_MAX_CONCURRENT_REQUESTS=${GATEWAY_IMAGE_CONCURRENCY_MAX_CONCURRENT_REQUESTS:-0}
      - GATEWAY_IMAGE_CONCURRENCY_OVERFLOW_MODE=${GATEWAY_IMAGE_CONCURRENCY_OVERFLOW_MODE:-reject}
      - GATEWAY_IMAGE_CONCURRENCY_WAIT_TIMEOUT_SECONDS=${GATEWAY_IMAGE_CONCURRENCY_WAIT_TIMEOUT_SECONDS:-30}
      - GATEWAY_IMAGE_CONCURRENCY_MAX_WAITING_REQUESTS=${GATEWAY_IMAGE_CONCURRENCY_MAX_WAITING_REQUESTS:-100}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexora-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  postgres:
    image: postgres:18-alpine
    container_name: nexora-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    shm_size: 256m
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    environment:
      - PGDATA=/var/lib/postgresql/data
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB is required}
      - TZ=${TZ:-Asia/Hong_Kong}
    networks:
      - nexora-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexora} -d ${POSTGRES_DB:-nexora}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:8-alpine
    container_name: nexora-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - ./redis_data:/data
    secrets:
      - redis_password
    command: >
      sh -ceu '
        export REDIS_PASSWORD="$$(cat /run/secrets/redis_password)"
        redis-server
        --save 60 1
        --appendonly yes
        --appendfsync everysec
        --requirepass "$$REDIS_PASSWORD"'
    environment:
      - TZ=${TZ:-Asia/Hong_Kong}
    networks:
      - nexora-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/redis_password)\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

networks:
  nexora-network:
    driver: bridge

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE_PATH:-./runtime/secrets/postgres_password}
  redis_password:
    file: ${REDIS_PASSWORD_FILE_PATH:-./runtime/secrets/redis_password}
  admin_password:
    file: ${ADMIN_PASSWORD_FILE_PATH:-./runtime/secrets/admin_password}
  jwt_secret:
    file: ${JWT_SECRET_FILE_PATH:-./runtime/secrets/jwt_secret}
  totp_encryption_key:
    file: ${TOTP_ENCRYPTION_KEY_FILE_PATH:-./runtime/secrets/totp_encryption_key}
  turnstile_secret_key:
    file: ${BOOTSTRAP_TURNSTILE_SECRET_KEY_FILE_PATH:-./runtime/secrets/turnstile_secret_key}
  smtp_password:
    file: ${BOOTSTRAP_SMTP_PASSWORD_FILE_PATH:-./runtime/secrets/smtp_password}
